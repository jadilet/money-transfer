spring.application.name=transfer

# Local/dev datasource: in-memory H2. Swap to Postgres for real runs (see below).
spring.datasource.url=jdbc:h2:mem:transfer;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# Flyway migrations are Postgres-specific; the default (H2/test) profile lets Hibernate build the schema.
spring.flyway.enabled=false

# Account client: always the real account service (no stub).
account.base-url=http://localhost:8082
# Fraud client: 'stub' (in-process) until the real fraud service exists.
fraud.client=stub
fraud.base-url=http://localhost:8083

# Fraud policy: fail-closed by default (block when the fraud service is unavailable).
fraud.fail-open=false

# Outbox: 'log' publisher by default (no Kafka needed in dev); set to 'kafka' for the real one.
outbox.publisher=log
outbox.relay.interval-ms=1000
outbox.topic=ledger.postings

# Kafka (Redpanda) — only used when outbox.publisher=kafka.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Reconciliation: sweep PENDING transfers, resuming those quiet > min-age, expiring those older than max-age.
reconcile.interval-ms=10000
reconcile.min-age-ms=30000
reconcile.max-age-ms=3600000

# Postgres (enable when running against a real DB; switch ddl-auto to validate + Flyway):
# spring.datasource.url=jdbc:postgresql://localhost:5432/transfer
# spring.datasource.username=transfer
# spring.datasource.password=transfer
