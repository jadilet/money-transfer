# Postgres profile: run with --spring.profiles.active=postgres (DB via docker-compose, host port 5433).
spring.datasource.url=jdbc:postgresql://localhost:5433/transfer
spring.datasource.username=transfer
spring.datasource.password=transfer
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema; Hibernate only validates that the entities match it.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
