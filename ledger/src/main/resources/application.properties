spring.application.name=ledger
server.port=8083

# Local/dev datasource: in-memory H2. The 'postgres' profile switches to Postgres + Flyway.
spring.datasource.url=jdbc:h2:mem:ledger;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.flyway.enabled=false

# Kafka consumer (Redpanda) — reads the transfer events.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ledger
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
ledger.topic=ledger.postings
