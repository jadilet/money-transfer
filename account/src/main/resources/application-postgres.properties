# Postgres profile: run with --spring.profiles.active=postgres (DB via docker-compose, host port 5434).
spring.datasource.url=jdbc:postgresql://localhost:5434/account
spring.datasource.username=account
spring.datasource.password=account
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema; Hibernate only validates that the entities match it.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false

# Real caching via Redis (docker-compose, host port 6379).
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
