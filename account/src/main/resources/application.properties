spring.application.name=account
server.port=8082

# Local/dev datasource: in-memory H2. The 'postgres' profile switches to Postgres + Flyway.
spring.datasource.url=jdbc:h2:mem:account;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# Flyway migrations are Postgres-specific; the default (H2/test) profile lets Hibernate build the schema.
spring.flyway.enabled=false

# Default cache is in-process (no Redis needed for dev/tests); the postgres profile switches to Redis.
spring.cache.type=simple
