services:
  transfer-db:
    image: postgres:16
    container_name: money-transfer-db
    environment:
      POSTGRES_DB: transfer
      POSTGRES_USER: transfer
      POSTGRES_PASSWORD: transfer
    ports:
      - "5433:5432"
    volumes:
      - money-transfer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfer -d transfer"]
      interval: 5s
      timeout: 3s
      retries: 10

  account-db:
    image: postgres:16
    container_name: money-account-db
    environment:
      POSTGRES_DB: account
      POSTGRES_USER: account
      POSTGRES_PASSWORD: account
    ports:
      - "5434:5432"
    volumes:
      - money-account-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account -d account"]
      interval: 5s
      timeout: 3s
      retries: 10

  ledger-db:
    image: postgres:16
    container_name: money-ledger-db
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5435:5432"
    volumes:
      - money-ledger-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 10

  account-cache:
    image: redis:7
    container_name: money-account-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: redpandadata/redpanda:latest
    container_name: money-kafka
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    image: nginx:1.27-alpine
    container_name: money-gateway
    ports:
      - "8088:8088"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  money-transfer-db-data:
  money-account-db-data:
  money-ledger-db-data:
