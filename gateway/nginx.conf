events {}

http {
    # Basic per-client rate limiting (the edge concern a gateway owns). Generous for local dev.
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # Services run on the host; from inside the container they're reachable via host.docker.internal.
    upstream transfer_service { server host.docker.internal:8080; }
    upstream account_service  { server host.docker.internal:8082; }
    upstream ledger_service   { server host.docker.internal:8083; }

    # Common proxy headers (auth/identity headers would be added here later).
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 8088;

        # Transfers -> transfer service
        location /api/transfers {
            limit_req zone=api burst=200 nodelay;
            proxy_pass http://transfer_service;
        }

        # Client accounts -> account service
        location /api/clients {
            limit_req zone=api burst=200 nodelay;
            proxy_pass http://account_service;
        }

        # Ledger reads -> ledger service
        location /api/ledger-accounts {
            limit_req zone=api burst=200 nodelay;
            proxy_pass http://ledger_service;
        }

        # Gateway's own health check (not proxied).
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "gateway ok\n";
        }
    }
}
